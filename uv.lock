    t15_c = st.number_input("テンP15頭数", value=0)
    t30_c = st.number_input("テンP30頭数", value=0)

# 展開計算
pace_score = (t15_c * 2) + t30_c
is_short = race_dist <= 1400
if pace_score >= 8: pace_diff, pace_lbl = (-40 if is_short else -25, "超激戦")
elif pace_score >= 5: pace_diff, pace_lbl = (-20 if is_short else -10, "激戦")
elif pace_score <= 2: pace_diff, pace_lbl = (25 if is_short else 15, "スロー")
else: pace_diff, pace_lbl = (0, "平均")

tab1, tab2 = st.tabs(["🏇 AI診断入力", "📈 実績ダッシュボード"])

with tab1:
    st.info(f"🌪️ 判定: **{pace_lbl}** (補正: {pace_diff}pt)")
    
    if 'h_count' not in st.session_state: st.session_state.h_count = 1
    def add_h(): st.session_state.h_count += 1
    
    user_data = []
    for i in range(st.session_state.h_count):
        with st.expander(f"🐴 馬 {i+1} 頭目", expanded=True):
            col1, col2, col3, col4 = st.columns(4)
            with col1: name = st.text_input("馬名", key=f"n_{i}")
            with col2: t_type = st.selectbox("タイプ", ["父カナロア", "母父カナロア", "タワーオブロンドン"], key=f"t_{i}")
            with col3: sex = st.selectbox("性別", ["牡", "牝", "セ"], key=f"s_{i}")
            with col4: p_dist = st.number_input("前走距離", value=1200, key=f"pd_{i}")
            
            col5, col6, col7 = st.columns(3)
            with col5: waku = st.number_input("枠", 1, 8, key=f"w_{i}")
            with col6: jockey = st.text_input("騎手", key=f"j_{i}")
            with col7: m_father = st.text_input("母父(父)", key=f"mf_{i}")
            
            col8, col9, col10, col11, col12 = st.columns(5)
            with col8: rank = st.selectbox("人気", ["A","B","C","D","E"], index=2, key=f"r_{i}")
            with col9: odds = st.number_input("単勝オッズ", value=10.0, key=f"o_{i}")
            with col10: f_odds = st.number_input("複勝オッズ", value=2.0, key=f"f_{i}")
            with col11: tp = st.selectbox("テンP", ["なし","15","30","50"], key=f"tp_{i}")
            with col12: up = st.selectbox("上がりP", ["なし","15","30"], key=f"up_{i}")
            
            if name: user_data.append({'名前':name, 'タイプ':t_type, '性別':sex, '前走距離':p_dist, '枠':waku, '騎手':jockey, 'ランク':rank, 'オッズ':odds, '複オッズ':f_odds, 'tp':tp, 'up':up, '母父':m_father})

    st.button("➕ 馬を追加", on_click=add_h)

    if st.button("🚀 AI診断を実行", type="primary", use_container_width=True):
        weights = get_adaptive_weights()
        final_list = []
        for h in user_data:
            roi = 80; factors = [h['タイプ']]
            if h['タイプ'] == "父カナロア":
                if '芝' in race_track:
                    if h['性別'] != 'セ' and h['前走距離'] > race_dist: roi += 20; factors.append("短縮(芝)")
                if h['tp'] == '15': roi += weights.get("テンP15", 15) + (8 if h['枠'] <= 3 else 0) + pace_diff
            
            # 共通計算
            prob, true_ev, place_ev, bet = calculate_true_value_and_bet(roi, h['ランク'], h['オッズ'], h['複オッズ'], top_odds, bankroll, head_count)
            st.success(f"### {h['名前']}: 期待値 {true_ev:.1f}% / 推奨 {bet}円")
            final_list.append({'日付': race_date, '場': race_place, '馬名': h['名前'], '予想期待値': true_ev, '着順': ""})
            
        if final_list:
            df_new = pd.DataFrame(final_list)
            if os.path.exists(HISTORY_FILE): df_new = pd.concat([pd.read_csv(HISTORY_FILE), df_new], ignore_index=True)
            df_new.to_csv(HISTORY_FILE, index=False)
            st.write("✅ 保存しました。")