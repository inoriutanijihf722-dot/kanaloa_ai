# ⚙️ 2. 設定・定数（ベイズ学習エンジン）
# ======================================================
HISTORY_FILE = 'kanaloa_investment_log.csv'

base_weights = {
    "黄金A(ディープ)": 35, "黄金B(クロフネ)": 30, "黄金C(ダイワメジャー)": 10, 
    "次世代(母父カナロア)": 15, "梅田智之": 15, "安田翔伍": 15, "本田優": 15, "手塚貴久": 15, 
    "西村淳也": 15, "岩田望来": 15, "横山和生": 15, "松若風馬": 15, 
    "母父カナロア×西村/岩田望": 15, "母父カナロア芝×石坂/笹田": 20,
    "ユニオン": 12, "ロードHC": 15, "テンP15": 15, "テンP30": 8, 
    "上がりP15": 15, "上がりP30": 8, "内枠ボーナス": 8, "短縮ショック": 15
}

@st.cache_data(ttl=60)
def get_adaptive_weights():
    weights = base_weights.copy()
    if not os.path.exists(HISTORY_FILE): return weights
    try:
        df_h = pd.read_csv(HISTORY_FILE)
        if not df_h.empty and '適用要素' in df_h.columns and '着順' in df_h.columns:
            df_h['適用要素'] = df_h['適用要素'].fillna('').astype(str)
            df_h['着順'] = pd.to_numeric(df_h['着順'], errors='coerce')
            rank_map = {'A':1, 'B':2, 'C':3, 'D':4, 'E':5}
            df_h['成功'] = (df_h['着順'] <= 3) | (df_h['着順'] < df_h['人気ランク'].map(rank_map))
            for f in weights.keys():
                rel = df_h[df_h['適用要素'].str.contains(f.replace('(', r'\(').replace(')', r'\)'), na=False, regex=True)].dropna(subset=['着順'])
                if len(rel) >= 5: 
                    wins = rel['成功'].sum()
                    adj = max(0.3, min(1.5, (2 + wins) / (10 + len(rel)) / 0.2))
                    weights[f] = int(round(weights[f] * adj))
    except: pass
    return weights

# ======================================================
# 💰 3. クオンツ・エンジン
# ======================================================
def calculate_true_value_and_bet(ai_score, popular_rank, odds, f_odds, top_odds, bankroll, head_count):
    if odds <= 0.0: return 0.0, 0.0, 0.0, 0
    base_win_rate = {'A': 0.30, 'B': 0.15, 'C': 0.08, 'D': 0.04, 'E': 0.02}
    if top_odds >= 4.0:
        d_rate = {"A": 0.21, "B": 0.12, "C": 0.10, "D": 0.07, "E": 0.05}
    elif top_odds <= 2.0:
        d_rate = {"A": 0.36, "B": 0.15, "C": 0.06, "D": 0.02, "E": 0.01}
    else: d_rate = base_win_rate

    final_prob = min(d_rate.get(popular_rank, 0.02) * max(0.5, ai_score/100.0), 0.40)
    true_ev = (final_prob * odds) * 100
    multiplier = 2.0 if head_count <= 10 else 2.8 if head_count >= 16 else 2.5
    place_ev = (min(final_prob * multiplier, 0.90) * f_odds) * 100 if f_odds > 0 else 0
    edge = (final_prob * odds) - 1.0
    if edge <= 0: return final_prob, true_ev, place_ev, 0
    bet_amount = int(min(bankroll * (edge / (odds - 1.0)) * 0.5, bankroll * 0.05) // 100) * 100
    return final_prob, true_ev, place_ev, bet_amount

